name: "Uday's.Daily[Energy]"

on:
  # Recurring delivery is intentionally off until the manual sample send is approved.
  # To enable 7am ET daily delivery, uncomment the schedule block below.
  # schedule:
  #   - cron: "0 11 * * *"
  #   - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      sample_data:
        description: "Use deterministic sample newsletter content"
        required: true
        type: boolean
        default: true
      send_email:
        description: "Actually send email instead of dry-run preview"
        required: true
        type: boolean
        default: false

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r newsletter/requirements.txt

      - name: Keep schedule at 7am America/New_York
        if: github.event_name == 'schedule'
        run: |
          if [ "$(TZ=America/New_York date +%H)" != "07" ]; then
            echo "Not 7am ET; skipping duplicate UTC cron."
            echo "SHOULD_SEND=false" >> "$GITHUB_ENV"
          fi

      - name: Send digest
        if: env.SHOULD_SEND != 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ vars.SENDER_EMAIL }}
          SAMPLE_DATA: ${{ github.event_name == 'workflow_dispatch' && inputs.sample_data && 'true' || 'false' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && !inputs.send_email && 'true' || 'false' }}
        run: python -m newsletter.main
