name: "Uday's.Daily Newsletters"

on:
  # 7:00 AM Asia/Kolkata daily. GitHub Actions cron is UTC.
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      sample_data:
        description: "Use deterministic sample newsletter content"
        required: true
        type: boolean
        default: true
      send_email:
        description: "Actually send email instead of dry-run preview"
        required: true
        type: boolean
        default: false
      profile:
        description: "Newsletter profile to run"
        required: true
        type: choice
        options:
          - both
          - energy
          - ai
        default: both

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [energy, ai]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r newsletter/requirements.txt

      - name: Confirm scheduled India-time delivery
        if: github.event_name == 'schedule'
        run: |
          echo "Scheduled for 7:00 AM Asia/Kolkata."
          TZ=Asia/Kolkata date

      - name: Send digest
        if: github.event_name != 'workflow_dispatch' || inputs.profile == 'both' || inputs.profile == matrix.profile
        env:
          NEWSLETTER_PROFILE: ${{ matrix.profile }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ vars.SENDER_EMAIL }}
          SAMPLE_DATA: ${{ github.event_name == 'workflow_dispatch' && inputs.sample_data && 'true' || 'false' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && !inputs.send_email && 'true' || 'false' }}
        run: python -m newsletter.main
